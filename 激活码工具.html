<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI音频增强 - 激活工具</title>
    <style>
        body{background:#0f172a;color:#fff;padding:20px;font-family:Arial}
        .card{background:#1e293b;border-radius:12px;padding:18px;margin-bottom:12px}
        input,select{width:100%;padding:10px;margin:8px 0;border-radius:6px;background:#334155;color:#fff;border:0}
        button{padding:10px 16px;background:#0ecdcf;color:#fff;border:0;border-radius:6px;cursor:pointer}
        .code{background:#22d3ee20;padding:12px;border-radius:6px;color:#22d3ee;margin:10px 0;font-family:monospace}
        .log{background:#000;color:#0f0;padding:12px;border-radius:6px;height:240px;overflow-y-auto;margin-top:10px;font-size:12px}
    </style>
</head>
<body>
    <h2 style="text-align:center;color:#22d3ee;margin-bottom:20px">AI音频增强｜激活工具</h2>
    <div class="card">
        <h3>生成激活码</h3>
        <input id="dev" placeholder="客户机器码">
        <select id="type">
            <option value="preset">套餐</option>
            <option value="custom">自定义</option>
        </select>
        <select id="plan">
            <option value="trial">试用 1天2次</option>
            <option value="once">1天1次</option>
            <option value="month">30天50次</option>
            <option value="year">365天1000次</option>
        </select>
        <input id="days" style="display:none" placeholder="自定义天数">
        <input id="times" style="display:none" placeholder="自定义次数">
        <button onclick="gen()">生成</button>
        <div class="code" id="out"></div>
    </div>
    <div class="card">
        <h3>查询</h3>
        <input id="q" placeholder="客户机器码">
        <button onclick="find()">查询</button>
        <div class="code" id="qres"></div>
    </div>
    <div class="card">
        <h3>换机（手动填剩余天数/次数）</h3>
        <input id="old" placeholder="旧机器码">
        <input id="new" placeholder="新机器码">
        <input id="rd" placeholder="剩余天数">
        <input id="rt" placeholder="剩余次数">
        <button onclick="change()" style="background:#0bcd9f">生成换机码</button>
        <div class="code" id="cres"></div>
    </div>
    <div class="log" id="log"></div>

<script>
// ====================
// AI版独立键：YX_CODES_AI
// ====================
let codes = JSON.parse(localStorage.getItem("YX_CODES_AI"))||[];
let logs = JSON.parse(localStorage.getItem("YX_LOGS_AI"))||[];

const cfg = {
    trial:{d:1,t:2}, once:{d:1,t:1}, month:{d:30,t:50}, year:{d:365,t:1000}
};

document.getElementById("type").onchange=e=>{
    let v = e.target.value;
    document.getElementById("plan").style.display = v=="preset"?"block":"none";
    document.getElementById("days").style.display = v=="custom"?"block":"none";
    document.getElementById("times").style.display = v=="custom"?"block":"none";
}

function r(){
    let c="0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
    return Array.from({length:36},_=>c[Math.floor(Math.random()*c.length)]).join("");
}

function s(){
    localStorage.setItem("YX_CODES_AI",JSON.stringify(codes));
    localStorage.setItem("YX_LOGS_AI",JSON.stringify(logs));
}

function l(t){
    logs.unshift(`[${new Date().toLocaleString()}] ${t}`);
    if(logs.length>100)logs=logs.slice(0,100);
    document.getElementById("log").innerText=logs.join("\n");
}

function gen(){
    let dev=document.getElementById("dev").value.trim();
    if(!dev)return alert("输入客户机器码");
    let t=document.getElementById("type").value;
    let d,ti;
    if(t=="preset"){
        let v=document.getElementById("plan").value;
        d=cfg[v].d; ti=cfg[v].t;
    }else{
        d=+document.getElementById("days").value;
        ti=+document.getElementById("times").value;
    }
    if(!d||!ti)return alert("填天数次数");
    let code=r();
    codes.push({code,device:dev,days:d,times:ti,used:false});
    s();
    document.getElementById("out").innerText=code;
    l(`生成：${dev} | ${d}天${ti}次 | ${code}`);
}

function find(){
    let q=document.getElementById("q").value.trim();
    let it=codes.find(x=>x.device==q);
    document.getElementById("qres").innerText=it?`机器：${it.device}\n激活码：${it.code}\n${it.days}天 ${it.times}次`:"无记录";
}

function change(){
    let old=document.getElementById("old").value.trim();
    let nw=document.getElementById("new").value.trim();
    let d=+document.getElementById("rd").value;
    let t=+document.getElementById("rt").value;
    if(!old||!nw||!d||!t)return alert("完整填写");
    let code=r();
    codes.push({code,device:nw,days:d,times:t,used:false});
    let o=codes.find(x=>x.device==old);
    if(o)o.used=true;
    s();
    document.getElementById("cres").innerText=code;
    l(`换机：${old}→${nw} | ${d}天${t}次`);
    alert("换机码已生成");
}

document.getElementById("log").innerText=logs.join("\n");
</script>
</body>
</html>
